    # 14、cnn + tc_res + mobile + gtc + RMResizePad + gray + all data
    # 18、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320 + all data
    # 19、cnn + tc_res + mobile + gtc + center + RMResizePad + gray + 64 320 + all data
    # 20、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + 64 320 + all data
    # - /yuanhuan/data/image/LicensePlate_ocr/training/plate_zd_mask/paddle_dict/ocr_merge_train_1210/ImageSets/Main/trainval.txt
    # - /yuanhuan/model/image/lpr/paddle_dict/ocr_merge_test_1210/ImageSets/Main/trainval.txt
    # - /yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_noaug_1210/ImageSets/Main/trainval.txt
    # - /yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_1210/ImageSets/Main/trainval.txt
    # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all data
    # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
    - /yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_1230/ImageSets/Main/trainval.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    # - RecConAug:
    #     prob: 0.5
    #     ext_data_num: 2
    #     image_shape: [64, 256, 3]
    #     max_text_length: *max_text_length
    - RecAug: 
        tia_prob: -1
        crop_prob: -1
        motion_blur_prob: 0.2
        blur_prob: 0.2
        expand_prob: 0.4
        hsv_aug_prob: 0.2
        jitter_prob: -1
        noise_prob: 0.2
        reverse_prob: 0.2
    - MultiLabelEncode:
    # 8、cnn + tc_res + mobile + gtc
    # - RecResizeImg:
    #     image_shape: [3, 64, 256]

    # 11、cnn + tc_res + mobile + gtc + RMResize
    # - RMRecResizeImg:
    #     image_shape: [3, 64, 256]
    #     padding: False
    
    # 12、cnn + tc_res + mobile + gtc + RMResize + gray
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 256]
    #     padding: False

    # 13、cnn + tc_res + mobile + gtc + RMResizePad + gray
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 256]
    #     padding: True

    # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 256]
    #     padding: True

    # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 320]
    #     padding: True
    #     # bool_random_resize: True
    #     bool_random_resize: False

    # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
    # - RMRecResizeImg:
    #     image_shape: [1, 32, 320]
    #     padding: True
    #     # bool_random_resize: True
    #     bool_random_resize: False
    
    # 14、cnn + tc_res + mobile + gtc + RMResizePad + gray + all data
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 256]
    #     padding: True
    #     # bool_random_resize: True
    #     bool_random_resize: False

    # 18、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320 + all data
    # 19、cnn + tc_res + mobile + gtc + center + RMResizePad + gray + 64 320 + all data
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 320]
    #     padding: True
    #     # bool_random_resize: True
    #     bool_random_resize: False

    # 20、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + 64 320 + all data
    # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all data
    # - RMRecResizeImg:
    #     image_shape: [1, 64, 320]
    #     padding: True
    #     bool_random_resize: False
    #     bool_white: True

    # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
    - RMRecResizeImg:
        image_shape: [1, 64, 384]
        padding: True
        bool_random_resize: False
        bool_white: True

    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
        - valid_ratio
  loader:
    shuffle: true
    batch_size_per_card: 256
    drop_last: true
    num_workers: 8
