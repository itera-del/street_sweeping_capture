  # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
  # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
  # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
