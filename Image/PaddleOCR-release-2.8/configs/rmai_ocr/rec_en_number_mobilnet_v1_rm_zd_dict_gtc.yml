  # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all data
  # character_dict_path: /yuanhuan/data/image/LicensePlate_ocr/original/zd/UAE/type/zd_dict_1222.txt
  # max_text_length: &max_text_length 10
  # infer_mode: False
  # use_space_char: True

  # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
  character_dict_path: /yuanhuan/data/image/LicensePlate_ocr/original/zd/UAE/type/zd_dict_1222.txt
  max_text_length: &max_text_length 12
  infer_mode: False
  use_space_char: True

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05


Architecture:
  model_type: rec
  algorithm: SVTR
  Transform:
  # 8、cnn + tc_res + mobile + gtc
  # 11、cnn + tc_res + mobile + gtc + RMResize
  # in_channels: 3

  # 12、cnn + tc_res + mobile + gtc + RMResize + gray
  # 13、cnn + tc_res + mobile + gtc + RMResizePad + gray
  # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
  # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
  # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
  # 14、cnn + tc_res + mobile + gtc + RMResizePad + gray + all data
  # 18、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320 + all data
  # 19、cnn + tc_res + mobile + gtc + center + RMResizePad + gray + 64 320 + all data
  # 20、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + 64 320 + all data
  # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all data
  # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
  in_channels: 1
  Backbone:
    name: MobileNetV1RM
  Head:
    name: MultiHead
    head_list:
      - TCRESHead:
          # 8、cnn + tc_res + mobile + gtc
          # Neck:
          #   name: tcres_mobile
          #   hidden_size: 128
          # Head:
          #   fc_decay: 0.00001

          # 11、cnn + tc_res + mobile + gtc + RMResize
          # 12、cnn + tc_res + mobile + gtc + RMResize + gray
          # 13、cnn + tc_res + mobile + gtc + RMResizePad + gray
          # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
          # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
          # 14、cnn + tc_res + mobile + gtc + RMResizePad + gray + all data
          # 18、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320 + all data
          # 20、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + 64 320 + all data
          # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all data
          # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
          Neck:
            name: tcres_mobile_no_reshape
            hidden_size: 128
          Head:
            name: RMCTCHead
            fc_decay: 0.00001
          
          # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
          # 19、cnn + tc_res + mobile + gtc + center + RMResizePad + gray + 64 320 + all data
          # Neck:
          #   name: tcres_mobile_no_reshape
          #   hidden_size: 128
          # Head:
          #   name: RMCTCHead
          #   mid_channels: 96
          #   fc_decay: 0.00001
          #   return_feats: true

      - SARHead:
          enc_dim: 128
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    # 8、cnn + tc_res + mobile + gtc
    # 11、cnn + tc_res + mobile + gtc + RMResize
    # 12、cnn + tc_res + mobile + gtc + RMResize + gray
    # 13、cnn + tc_res + mobile + gtc + RMResizePad + gray
    # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
    # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
    # 14、cnn + tc_res + mobile + gtc + RMResizePad + gray + all data
    # 18、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320 + all data
    # 20、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + 64 320 + all data
    # 21、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 320 + all datas
    # 22、cnn + tc_res + mobile + gtc + RMResizePadWhite + gray + End + 64 384 + all data
    - CTCLoss:
    - SARLoss:

    # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
    # 19、cnn + tc_res + mobile + gtc + center + RMResizePad + gray + 64 320 + all data
    # - CombinedLoss:
    #   - CTCLoss:
    #       use_focal_loss: false
    #       weight: 1.0
    #   - CenterLoss:
    #       weight: 0.05
    #       num_classes: 40
    #       feat_dim: 96
    #       center_file_path:
    # - SARLoss:

PostProcess:  
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ""
    ext_op_transform_idx: 1
    label_file_list:
    # 8、cnn + tc_res + mobile + gtc
    # 11、cnn + tc_res + mobile + gtc + RMResize
    # 12、cnn + tc_res + mobile + gtc + RMResize + gray
    # 13、cnn + tc_res + mobile + gtc + RMResizePad + gray
    # 15、cnn + tc_res + mobile + gtc + center + RMResizePad + gray
    # 16、cnn + tc_res + mobile + gtc + RMResizePad + gray + 64 320
    # 17、cnn + tc_res + mobile + gtc + RMResizePad + gray + 32 320
