    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_20240625_nodiffste_nofangse/ImageSets/Main/test.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_20240625_nodiffste_sample/ImageSets/Main/test.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_20240625_nodiffste_sample_mini/ImageSets/Main/test.txt"]
    label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_202407/ImageSets/Main/test.txt"]

    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - CTCLabelEncode: # Class handling label

      # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
      - RMRecResizeImg:
          image_shape: [1, 64, 256]
          padding: False
      # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
