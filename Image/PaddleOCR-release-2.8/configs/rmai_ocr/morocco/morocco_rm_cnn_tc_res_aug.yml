Global:
  use_gpu: True
  epoch_num: 300
  log_smooth_window: 20
  print_batch_step: 10
  # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
  # save_model_dir: /yuanhuan/model/image/lpr/paddle_ocr/v1_morocco_mobilenet_v1_rm_cnn_tc_res_mobile_rmresize_gray_64_256_20250515_Aug
  # save_model_dir: /yuanhuan/model/image/lpr/paddle_ocr/v1_morocco_mobilenet_v1_rm_cnn_tc_res_mobile_rmresize_gray_64_256_20250528_Aug_Diffste
  # save_model_dir: /yuanhuan/model/image/lpr/paddle_ocr/v1_morocco_mobilenet_v1_rm_cnn_tc_res_mobile_rmresize_gray_64_256_20250530_Aug_Diffste
  save_model_dir: /yuanhuan/model/image/lpr/paddle_ocr/v1_morocco_mobilenet_v1_rm_cnn_tc_res_mobile_rmresize_gray_64_256_20250603_Aug_Diffste
  save_epoch_step: 25
  # evaluation is run every 20000000 iterations after the 4000th iteration
  eval_batch_step: [0, 20000000]
  # if pretrained_model is saved in static mode, load_static_weights must set to True
  cal_metric_during_train: True
  pretrained_model: /yuanhuan/model/image/lpr/paddle_ocr/v1_morocco_mobilenet_v1_rm_cnn_tc_res_mobile_rmresize_gray_64_256_20250530_Aug_Diffste/latest
  checkpoints: 
  save_inference_dir:
  use_visualdl: False
  infer_img:
  # for data or label process
  # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
  # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
  character_dict_path: /yuanhuan/model/image/lpr/paddle_dict/plate_morocco_mask_20250603_Diffste/morocco_dict.txt
  max_text_length: 10
  infer_mode: False
  use_space_char: True
  # use_space_char: False  # 训练统一不增加空格标签
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
    # learning_rate: 0.0001
    warmup_epoch: 5
  regularizer:
    name: 'L2'
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: CRNN
  Transform:
  # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
  in_channels: 1
  # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
  # in_channels: 3

  Backbone:
    name: MobileNetV1RM
    widen_factor: 1.0
    deepen_factor: 1.0
  Neck:
    # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
    # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
    name: TCRES
    encoder_type: tcres_mobile_no_reshape
    hidden_size: 128
    widen_factor: 1.0
    deepen_factor: 1.0

  Head:
    # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
    # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
    name: RMCTCHead
    fc_decay: 0.00001

Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ""
    # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
    # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
    label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_morocco_mask_20250603_Diffste/ImageSets/Main/trainval.txt"]

    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - RecAug: 
          tia_prob: -1
          crop_prob: -1
          motion_blur_prob: 0.2
          blur_prob: 0.2
          expand_prob: 0.4
          hsv_aug_prob: 0.2
          jitter_prob: -1
          noise_prob: 0.2
          reverse_prob: 0.2
      - CTCLabelEncode: # Class handling label

      # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
      - RMRecResizeImg:
          image_shape: [1, 64, 256]
          padding: False
      # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
      # - RMRecResizeImg:
      #     image_shape: [3, 64, 256]
      #     padding: False

      - KeepKeys:
          keep_keys: ['image', 'label', 'length'] # dataloader will return list in this order
  loader:
    shuffle: True
    # batch_size_per_card: 256
    batch_size_per_card: 512
    drop_last: True
    num_workers: 10

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ""
    # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
    # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
    label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_morocco_mask_20250603_NoAugNoDiffste/ImageSets/Main/test.txt"]

    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - CTCLabelEncode: # Class handling label

      # 18、cnn + tc_res + mobile + RMRESIZE + gray + 64 256 + all data
      - RMRecResizeImg:
          image_shape: [1, 64, 256]
          padding: False
      # 19、cnn + tc_res + mobile + RMRESIZE + 64 256 + all data
      # - RMRecResizeImg:
      #     image_shape: [3, 64, 256]
      #     padding: False

      - KeepKeys:
          keep_keys: ['image', 'label', 'length'] # dataloader will return list in this order
  loader:
    shuffle: False
    drop_last: False
    # batch_size_per_card: 256
    batch_size_per_card: 512
    num_workers: 10

