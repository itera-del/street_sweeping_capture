    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_1210/ImageSets/Main/test.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_zd_mask_202301/ImageSets/Main/test.txt"]
    label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_202305/ImageSets/Main/test.txt"]

    # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
    # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
