  checkpoints: 
  save_inference_dir:
  use_visualdl: False
  infer_img:
  # for data or label process
  # 1、cnn
  # 2、cnn + dnn
  # 3、cnn + rnn
  # 4、cnn + tc_res
  # 5、cnn + tc_res + mobile
  # 10、cnn + tc_res + mobile + RMRESIZE
  # 11、cnn + tc_res + mobile + RMRESIZE + gray
  # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
  # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
  # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
  # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
  # character_dict_path: /yuanhuan/data/image/RM_ANPR/original/zd/UAE/type/zd_dict.txt
  character_dict_path: /yuanhuan/model/image/lpr/paddle_dict/plate_cn_202305/cn_dict.txt
  max_text_length: 10
  infer_mode: False
  use_space_char: True

  # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
  # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
  # character_dict_path: /yuanhuan/data/image/RM_ANPR/original/zd/UAE/type/zd_dict_1222.txt
  # max_text_length: 12
  # infer_mode: False
  # use_space_char: True

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
    # learning_rate: 0.0001
    warmup_epoch: 5
  regularizer:
    name: 'L2'
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: CRNN
  Transform:
  # 1、cnn
  # 2、cnn + dnn
  # 3、cnn + rnn
  # 4、cnn + tc_res
  # 5、cnn + tc_res + mobile
  # 10、cnn + tc_res + mobile + RMRESIZE
  # in_channels: 3

  # 11、cnn + tc_res + mobile + RMRESIZE + gray
  # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
  # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
  # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
  # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
  # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
  # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
  in_channels: 1

  Backbone:
    name: MobileNetV1RM
  Neck:
    # 1、cnn
    # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
    # name: SequenceEncoder
    # encoder_type: reshape

    # # 2、cnn + dnn
    # name: SequenceEncoder
    # encoder_type: fc
    # hidden_size: 128

    # 3、cnn + rnn
    # # name: SequenceEncoder
    # encoder_type: rnn
    # hidden_size: 48

    # # 4、cnn + tc_res
    # name: TCRES
    # encoder_type: tcres
    # hidden_size: 128

    # # 5、cnn + tc_res + mobile
    # name: TCRES
    # encoder_type: tcres_mobile
    # hidden_size: 128

    # 10、cnn + tc_res + mobile + RMRESIZE
    # 11、cnn + tc_res + mobile + RMRESIZE + gray
    # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
    # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
    # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
    # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
    # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
    name: TCRES
    encoder_type: tcres_mobile_no_reshape
    hidden_size: 128

  Head:
    # 1、cnn
    # 2、cnn + dnn
    # 3、cnn + rnn
    # 4、cnn + tc_res
    # 5、cnn + tc_res + mobile
    # name: CTCHead
    # fc_decay: 0.00001
    
    # 10、cnn + tc_res + mobile + RMRESIZE
    # 11、cnn + tc_res + mobile + RMRESIZE + gray
    # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
    # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
    # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
    # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
    # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
    # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
    name: RMCTCHead
    fc_decay: 0.00001

Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ""
    # 1、cnn
    # 2、cnn + dnn
    # 3、cnn + rnn
    # 4、cnn + tc_res
    # 5、cnn + tc_res + mobile 
    # 10、cnn + tc_res + mobile + RMRESIZE
    # label_file_list: ["/yuanhuan/data/image/RM_ANPR/training/plate_zd_mask/paddle_dict/ocr_merge_test/ImageSets/Main/train.txt"]

    # 11、cnn + tc_res + mobile + RMRESIZE + gray
    # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
    # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
    # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
    # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/ocr_merge_test_1210/ImageSets/Main/trainval.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_noaug_1210/ImageSets/Main/trainval.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_1210/ImageSets/Main/trainval.txt"]
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_zd_mask_202301/ImageSets/Main/trainval.txt"]
    label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/plate_cn_202305/ImageSets/Main/trainval.txt"]

    # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
    # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
    # label_file_list: ["/yuanhuan/model/image/lpr/paddle_dict/ocr_merge_train_1230/ImageSets/Main/trainval.txt"]

    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - RecAug: 
          tia_prob: -1
          crop_prob: -1
          motion_blur_prob: 0.2
          blur_prob: 0.2
          expand_prob: 0.4
          hsv_aug_prob: 0.2
          jitter_prob: -1
          noise_prob: 0.2
          reverse_prob: 0.2
      - CTCLabelEncode: # Class handling label
      # 1、cnn
      # 2、cnn + dnn
      # 3、cnn + rnn
      # 4、cnn + tc_res
      # 5、cnn + tc_res + mobile
      # - RecResizeImg:
      #     image_shape: [3, 64, 256]

      # 10、cnn + tc_res + mobile + RMRESIZE
      # - RMRecResizeImg:
      #     image_shape: [3, 64, 256]
      #     padding: False
      
      # 11、cnn + tc_res + mobile + RMRESIZE + gray
      # - RMRecResizeImg:
      #     image_shape: [1, 64, 256]
      #     padding: False

      # 12、cnn + tc_res + mobile + RMResizePad + gray + 64 320 + all data
      # - RMRecResizeImg:
      #     image_shape: [1, 64, 320]
      #     padding: True
      #     bool_random_resize: False

      # 13、cnn + tc_res + mobile + RMResizePadWhite + gray + 64 320 + all data
      # 14、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 320 + all data
      # 17、cnn + mobile + RMResizePadWhite + gray + 64 320 + all data
      - RMRecResizeImg:
          image_shape: [1, 64, 320]
          padding: True
          bool_random_resize: False
          bool_white: True

      # 15、cnn + tc_res + mobile + RMResizePadWhite + gray + End + 64 384 + all data
      # - RMRecResizeImg:
      #     image_shape: [1, 64, 384]
      #     padding: True
      #     bool_random_resize: False
      #     bool_white: True

      # 16、cnn + tc_res + mobile + RMRESIZE + gray + 64 320 + all data
      # - RMRecResizeImg:
      #     image_shape: [1, 64, 320]
      #     padding: False
      #     bool_random_resize: False
      #     bool_white: False

      - KeepKeys:
          keep_keys: ['image', 'label', 'length'] # dataloader will return list in this order
  loader:
    shuffle: True
    batch_size_per_card: 256
    drop_last: True
    num_workers: 8

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ""
    # 1、cnn
    # 2、cnn + dnn
    # 3、cnn + rnn
    # 4、cnn + tc_res
    # 5、cnn + tc_res + mobile 
